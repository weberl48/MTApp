name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # Use `npm install` (not `npm ci`): @tailwindcss/oxide's nested wasm @emnapi deps
        # resolve to different versions on Windows (dev) vs Linux (CI), so a lockfile committed
        # from one OS fails the strict `npm ci` sync check on the other. `npm install` reconciles
        # the lock and installs. Versions stay bounded by package.json ranges.
        run: npm install --no-audit --no-fund

      - name: Run linter
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test -- --run

      # E2E tests require Supabase to be running - run locally with:
      # npm run test:e2e

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # Use `npm install` (not `npm ci`): @tailwindcss/oxide's nested wasm @emnapi deps
        # resolve to different versions on Windows (dev) vs Linux (CI), so a lockfile committed
        # from one OS fails the strict `npm ci` sync check on the other. `npm install` reconciles
        # the lock and installs. Versions stay bounded by package.json ranges.
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          # Required for build
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
